<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#080808" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Tabata" />
  <link rel="manifest" href="/manifest.json" />
  <title>Tabata</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { background: #080808; color: #fff; font-family: 'Bebas Neue', sans-serif; overscroll-behavior: none; min-height: 100vh; }

    input[type=range] { -webkit-appearance: none; width: 100%; height: 3px; background: #1e1e1e; border-radius: 2px; outline: none; cursor: pointer; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--accent, #ff4d00); }

    .pill { border: none; cursor: pointer; font-family: 'Bebas Neue', sans-serif; letter-spacing: 3px; border-radius: 6px; transition: all 0.15s; }
    .pill:active { transform: scale(0.97); }

    .counter-btn {
      background: #111; border: 1px solid #1e1e1e; color: #3a3a3a;
      border-radius: 6px; cursor: pointer; font-size: 0.65rem;
      width: 44px; height: 30px; display: flex; align-items: center; justify-content: center;
      transition: all 0.12s; font-family: monospace;
    }
    .counter-btn:active { background: #1a1a1a; color: #fff; }

    .tab-btn {
      padding: 3px 8px; border-radius: 4px; cursor: pointer;
      font-family: 'Space Mono', monospace; font-size: 0.45rem; letter-spacing: 1px;
      transition: all 0.15s; white-space: nowrap;
    }

    .music-wrap { display: flex; flex-direction: column; gap: 10px; }
    @media(min-width: 560px) { .music-wrap { flex-direction: row; } }

    #app { display: flex; flex-direction: column; align-items: center; padding: clamp(12px,4vw,24px) clamp(10px,4vw,20px) 60px; }
    .inner { width: 100%; max-width: 540px; }

    .mono { font-family: 'Space Mono', monospace; }
    .card { background: #0c0c0c; border: 1px solid #181818; border-radius: 12px; }

    /* Install banner */
    #install-banner {
      display: none; position: fixed; bottom: 0; left: 0; right: 0;
      background: #111; border-top: 1px solid #1e1e1e;
      padding: 12px 16px; z-index: 100;
      flex-direction: column; gap: 8px;
      font-family: 'Space Mono', monospace; font-size: 0.55rem; color: #aaa;
    }
    #install-banner.show { display: flex; }
    #install-banner button { background: #ff4d00; color: #fff; border: none; border-radius: 6px; padding: 8px 16px; font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 2px; cursor: pointer; }
    #install-banner .close-banner { background: none; border: none; color: #444; cursor: pointer; font-size: 1rem; align-self: flex-end; padding: 0; letter-spacing: 0; font-family: monospace; }
  </style>
</head>
<body>
<div id="app">
  <div class="inner">

    <!-- Title -->
    <div style="text-align:center;margin-bottom:18px">
      <div class="mono" style="font-size:0.45rem;letter-spacing:8px;color:#1e1e1e;margin-bottom:2px">INTERVAL TRAINER</div>
      <div id="title-text" style="font-size:clamp(3rem,12vw,5rem);letter-spacing:8px;line-height:0.95">TABATA</div>
      <div id="accent-bar" style="width:28px;height:2px;background:#ff4d00;margin:8px auto 0;transition:background 0.4s"></div>
    </div>

    <!-- Timer ring -->
    <div style="display:flex;flex-direction:column;align-items:center;margin-bottom:18px">
      <div style="position:relative;width:210px;height:210px">
        <svg id="ring-svg" width="210" height="210" style="position:absolute;transform:rotate(-90deg)">
          <circle cx="105" cy="105" r="98" fill="none" stroke="#141414" stroke-width="5"/>
          <circle id="ring-progress" cx="105" cy="105" r="98" fill="none" stroke="#ff4d00" stroke-width="5"
            stroke-dasharray="615.75" stroke-dashoffset="615.75" stroke-linecap="round"
            style="transition:stroke-dashoffset 0.95s linear,stroke 0.4s"/>
        </svg>
        <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center">
          <div id="phase-label" class="mono" style="font-size:0.43rem;letter-spacing:6px;color:#ff4d00;margin-bottom:3px;transition:color 0.4s;visibility:hidden">EFFORT</div>
          <div id="timer-display" style="font-size:clamp(2.6rem,9vw,3.8rem);line-height:1;color:#1e1e1e">--:--</div>
          <div id="rep-display" class="mono" style="font-size:0.42rem;letter-spacing:3px;color:#282828;margin-top:5px">PRÊT</div>
          <div id="music-indicator" class="mono" style="font-size:0.4rem;letter-spacing:1px;margin-top:4px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:rgba(255,77,0,0.4)"></div>
        </div>
      </div>
      <!-- Rep dots -->
      <div id="rep-dots" style="display:flex;gap:5px;margin-top:10px;flex-wrap:wrap;justify-content:center;max-width:250px;min-height:12px"></div>
    </div>

    <!-- Settings -->
    <div id="settings-panel">
      <!-- Counters -->
      <div class="card" style="padding:16px 10px;margin-bottom:10px">
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px">
          <!-- Effort -->
          <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
            <span class="mono" style="font-size:0.48rem;letter-spacing:4px;color:#3a3a3a">EFFORT</span>
            <button class="counter-btn" onclick="adj('effort',5)">▲</button>
            <div id="val-effort" style="background:#111;border:1.5px solid #1e1e1e;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:2.2rem;width:68px;text-align:center;border-radius:8px;padding:2px 0">40</div>
            <button class="counter-btn" onclick="adj('effort',-5)">▼</button>
            <span class="mono" style="font-size:0.45rem;color:#2a2a2a">sec</span>
          </div>
          <!-- Rest -->
          <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
            <span class="mono" style="font-size:0.48rem;letter-spacing:4px;color:#3a3a3a">REPOS</span>
            <button class="counter-btn" onclick="adj('rest',5)">▲</button>
            <div id="val-rest" style="background:#111;border:1.5px solid #1e1e1e;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:2.2rem;width:68px;text-align:center;border-radius:8px;padding:2px 0">20</div>
            <button class="counter-btn" onclick="adj('rest',-5)">▼</button>
            <span class="mono" style="font-size:0.45rem;color:#2a2a2a">sec</span>
          </div>
          <!-- Reps -->
          <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
            <span class="mono" style="font-size:0.48rem;letter-spacing:4px;color:#3a3a3a">REPS</span>
            <button class="counter-btn" onclick="adj('reps',1)">▲</button>
            <div id="val-reps" style="background:#111;border:1.5px solid #1e1e1e;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:2.2rem;width:68px;text-align:center;border-radius:8px;padding:2px 0">8</div>
            <button class="counter-btn" onclick="adj('reps',-1)">▼</button>
            <span class="mono" style="font-size:0.45rem;color:#2a2a2a">×</span>
          </div>
        </div>
        <div id="total-time" class="mono" style="text-align:center;margin-top:12px;font-size:0.45rem;color:#1e1e1e;letter-spacing:2px">DURÉE TOTALE : 04:48</div>
      </div>

      <!-- Music -->
      <div class="card" style="padding:14px 12px;margin-bottom:12px">
        <div class="mono" style="font-size:0.45rem;letter-spacing:5px;color:#1e1e1e;margin-bottom:12px">MUSIQUE (OPTIONNEL)</div>
        <div class="music-wrap">
          <!-- Effort music -->
          <div id="music-effort" style="flex:1;background:#0c0c0c;border:1px solid #181818;border-radius:10px;padding:12px 14px">
            <div class="mono" style="font-size:0.48rem;letter-spacing:5px;color:#ff4d00;margin-bottom:10px">◈ EFFORT</div>
            <div style="display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap" id="tabs-effort"></div>
            <div id="input-area-effort"></div>
          </div>
          <!-- Rest music -->
          <div id="music-rest" style="flex:1;background:#0c0c0c;border:1px solid #181818;border-radius:10px;padding:12px 14px">
            <div class="mono" style="font-size:0.48rem;letter-spacing:5px;color:#00c8ff;margin-bottom:10px">◈ REPOS</div>
            <div style="display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap" id="tabs-rest"></div>
            <div id="input-area-rest"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Buttons -->
    <div id="btn-area" style="display:flex;gap:8px"></div>

  </div>
</div>

<!-- PWA Install banner (Android/desktop) -->
<div id="install-banner">
  <span>📲 Installe Tabata comme une vraie app sur ton téléphone</span>
  <div style="display:flex;gap:8px;align-items:center">
    <button id="install-btn">INSTALLER</button>
    <button class="close-banner" id="close-banner">✕</button>
  </div>
</div>

<script>
// ─── STATE ──────────────────────────────────────────────────
const S = {
  effort: 40, rest: 20, reps: 8,
  phase: 'idle', // idle | effort | rest | done
  timeLeft: 0, currentRep: 0,
  effortProvider: 'spotify', restProvider: 'spotify',
  effortUrl: '', restUrl: '',
  effortFileName: '', restFileName: '',
  effortVolume: 0.8, restVolume: 0.6,
};
let timerInterval = null;
let effortAudio = null, restAudio = null;
const C = 2 * Math.PI * 98; // circumference

const PROVIDERS = [
  { id: 'spotify',  name: 'Spotify',      color: '#1DB954', icon: '🎵' },
  { id: 'apple',    name: 'Apple Music',  color: '#fa233b', icon: '🍎' },
  { id: 'youtube',  name: 'YouTube',      color: '#FF0000', icon: '▶'  },
  { id: 'file',     name: 'Fichier',      color: '#888',    icon: '📁' },
];

// ─── HELPERS ────────────────────────────────────────────────
const fmt = s => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
const $ = id => document.getElementById(id);
const accent = () => S.phase === 'rest' ? '#00c8ff' : S.phase === 'done' ? '#00ff88' : '#ff4d00';

function getEmbedUrl(provider, url) {
  if (!url) return null;
  if (provider === 'spotify') {
    const m = url.match(/spotify\.com\/(track|album|playlist|artist)\/([a-zA-Z0-9]+)/);
    return m ? `https://open.spotify.com/embed/${m[1]}/${m[2]}?utm_source=generator&theme=0` : null;
  }
  if (provider === 'apple') {
    const m = url.match(/music\.apple\.com\/([a-z]{2})\/(album|playlist)\/([^/]+)\/([^?]+)/);
    return m ? `https://embed.music.apple.com/${m[1]}/${m[2]}/${m[3]}/${m[4]}` : null;
  }
  if (provider === 'youtube') {
    const pl = url.match(/[?&]list=([a-zA-Z0-9_-]+)/);
    if (pl) return `https://www.youtube.com/embed/videoseries?list=${pl[1]}&autoplay=1`;
    const v = url.match(/(?:v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
    return v ? `https://www.youtube.com/embed/${v[1]}?autoplay=1` : null;
  }
  return null;
}

// ─── MUSIC ──────────────────────────────────────────────────
function stopAllAudio() {
  [effortAudio, restAudio].forEach(a => { if (a) { a.pause(); a.currentTime = 0; } });
}

function triggerMusic(type) {
  stopAllAudio();
  const provider = type === 'effort' ? S.effortProvider : S.restProvider;
  const url      = type === 'effort' ? S.effortUrl      : S.restUrl;
  if (provider === 'file') {
    const audio = type === 'effort' ? effortAudio : restAudio;
    if (audio) { audio.currentTime = 0; audio.play().catch(() => {}); }
  } else if (url) {
    window.open(url, '_blank', 'noopener,noreferrer');
  }
}

// ─── TIMER ──────────────────────────────────────────────────
function startTabata() {
  S.currentRep = 1;
  S.phase = 'effort';
  S.timeLeft = S.effort;
  triggerMusic('effort');
  runTick();
}

function runTick() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    S.timeLeft--;
    if (S.timeLeft <= 0) {
      clearInterval(timerInterval);
      if (S.phase === 'effort') {
        S.phase = 'rest';
        S.timeLeft = S.rest;
        triggerMusic('rest');
        runTick();
      } else {
        if (S.currentRep >= S.reps) {
          S.phase = 'done';
          stopAllAudio();
          render();
          return;
        } else {
          S.currentRep++;
          S.phase = 'effort';
          S.timeLeft = S.effort;
          triggerMusic('effort');
          runTick();
        }
      }
    }
    render();
  }, 1000);
  render();
}

function reset() {
  clearInterval(timerInterval);
  stopAllAudio();
  S.phase = 'idle'; S.timeLeft = 0; S.currentRep = 0;
  render();
}

// ─── COUNTER ────────────────────────────────────────────────
function adj(key, delta) {
  const limits = { effort: [5,120], rest: [5,120], reps: [1,30] };
  S[key] = Math.max(limits[key][0], Math.min(limits[key][1], S[key] + delta));
  $('val-effort').textContent = S.effort;
  $('val-rest').textContent   = S.rest;
  $('val-reps').textContent   = S.reps;
  $('total-time').textContent = `DURÉE TOTALE : ${fmt(S.reps * (S.effort + S.rest))}`;
}

// ─── MUSIC UI ───────────────────────────────────────────────
function buildMusicUI(type) {
  const color    = type === 'effort' ? '#ff4d00' : '#00c8ff';
  const provider = type === 'effort' ? S.effortProvider : S.restProvider;
  const url      = type === 'effort' ? S.effortUrl      : S.restUrl;
  const fileName = type === 'effort' ? S.effortFileName : S.restFileName;
  const volume   = type === 'effort' ? S.effortVolume   : S.restVolume;

  // Tabs
  const tabsEl = $(`tabs-${type}`);
  tabsEl.innerHTML = '';
  PROVIDERS.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn';
    btn.textContent = `${p.icon} ${p.name}`;
    btn.style.cssText = `border:1px solid ${provider === p.id ? p.color : '#1e1e1e'};background:${provider === p.id ? p.color+'18' : '#111'};color:${provider === p.id ? p.color : '#3a3a3a'}`;
    btn.onclick = () => {
      if (type === 'effort') S.effortProvider = p.id;
      else S.restProvider = p.id;
      buildMusicUI(type);
    };
    tabsEl.appendChild(btn);
  });

  // Input area
  const area = $(`input-area-${type}`);
  area.innerHTML = '';

  if (provider === 'file') {
    const label = document.createElement('label');
    label.style.cursor = 'pointer';
    const inp = document.createElement('input');
    inp.type = 'file'; inp.accept = 'audio/*';
    inp.style.display = 'none';
    inp.onchange = e => {
      const f = e.target.files[0];
      if (!f) return;
      const oldAudio = type === 'effort' ? effortAudio : restAudio;
      if (oldAudio) { oldAudio.pause(); URL.revokeObjectURL(oldAudio.src); }
      const audio = new Audio(URL.createObjectURL(f));
      audio.loop = true;
      audio.volume = volume;
      if (type === 'effort') { effortAudio = audio; S.effortFileName = f.name; }
      else { restAudio = audio; S.restFileName = f.name; }
      buildMusicUI(type);
    };
    const box = document.createElement('div');
    box.style.cssText = `border:1.5px dashed ${fileName ? color : '#1e1e1e'};border-radius:8px;padding:9px 12px;background:#111`;
    box.innerHTML = `<div style="font-family:'Space Mono',monospace;font-size:0.52rem;color:${fileName ? '#999' : '#2a2a2a'};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${fileName ? '♪ ' + fileName : 'choisir un fichier audio…'}</div>`;
    label.appendChild(inp);
    label.appendChild(box);
    area.appendChild(label);

    if (fileName) {
      const volWrap = document.createElement('div');
      volWrap.style.cssText = 'display:flex;align-items:center;gap:8px;margin-top:8px';
      volWrap.innerHTML = `<span class="mono" style="font-size:0.42rem;color:#2a2a2a;flex-shrink:0">VOL</span>`;
      const range = document.createElement('input');
      range.type = 'range'; range.min = 0; range.max = 1; range.step = 0.05;
      range.value = volume;
      range.style.cssText = `--accent:${color};flex:1`;
      range.oninput = e => {
        if (type === 'effort') { S.effortVolume = +e.target.value; if (effortAudio) effortAudio.volume = S.effortVolume; }
        else { S.restVolume = +e.target.value; if (restAudio) restAudio.volume = S.restVolume; }
      };
      volWrap.appendChild(range);
      area.appendChild(volWrap);
    }
  } else {
    const embedUrl = getEmbedUrl(provider, url);
    const inp = document.createElement('input');
    inp.type = 'url'; inp.value = url;
    inp.placeholder = PROVIDERS.find(p => p.id === provider)?.name + ' — coller un lien…';
    inp.style.cssText = `width:100%;background:#111;border:1px solid #1e1e1e;color:#ccc;font-family:'Space Mono',monospace;font-size:0.5rem;padding:7px 10px;border-radius:6px;outline:none`;
    inp.onfocus = () => inp.style.borderColor = color;
    inp.onblur  = () => inp.style.borderColor = '#1e1e1e';
    inp.oninput = e => {
      if (type === 'effort') S.effortUrl = e.target.value;
      else S.restUrl = e.target.value;
      buildMusicUI(type);
    };
    area.appendChild(inp);

    if (url && embedUrl) {
      const frame = document.createElement('iframe');
      frame.src = embedUrl; frame.width = '100%'; frame.height = '80';
      frame.frameBorder = '0';
      frame.allow = 'autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture';
      frame.style.cssText = 'border-radius:8px;display:block;margin-top:8px';
      area.appendChild(frame);
      const note = document.createElement('div');
      note.className = 'mono';
      note.style.cssText = 'font-size:0.42rem;color:#2a2a2a;margin-top:5px;line-height:1.5';
      note.textContent = '↗ S\'ouvrira dans une nouvelle fenêtre au démarrage de la phase';
      area.appendChild(note);
    } else if (url && !embedUrl) {
      const warn = document.createElement('div');
      warn.className = 'mono';
      warn.style.cssText = 'font-size:0.45rem;color:#ff4d00;margin-top:5px';
      warn.textContent = '⚠ Lien non reconnu';
      area.appendChild(warn);
    }
  }
}

// ─── RENDER ─────────────────────────────────────────────────
function render() {
  const isRunning = S.phase === 'effort' || S.phase === 'rest';
  const isEffort  = S.phase === 'effort';
  const isRest    = S.phase === 'rest';
  const isDone    = S.phase === 'done';
  const ac        = accent();

  // Accent bar
  $('accent-bar').style.background = ac;

  // Ring
  const progress = isRunning
    ? ((isEffort ? S.effort - S.timeLeft : S.rest - S.timeLeft) / (isEffort ? S.effort : S.rest)) * 100
    : 0;
  const ring = $('ring-progress');
  ring.style.stroke = ac;
  ring.style.strokeDashoffset = isRunning ? C - (progress / 100) * C : C;

  // Phase label
  const phaseLabel = $('phase-label');
  if (isRunning) {
    phaseLabel.style.visibility = 'visible';
    phaseLabel.style.color = ac;
    phaseLabel.textContent = isEffort ? 'EFFORT' : 'REPOS';
  } else {
    phaseLabel.style.visibility = 'hidden';
  }

  // Timer
  const timerEl = $('timer-display');
  if (S.phase === 'idle') { timerEl.textContent = '--:--'; timerEl.style.color = '#1e1e1e'; }
  else if (isDone)        { timerEl.textContent = 'FINI !'; timerEl.style.color = '#00ff88'; timerEl.style.fontSize = '2.4rem'; }
  else                    { timerEl.textContent = fmt(S.timeLeft); timerEl.style.color = '#fff'; timerEl.style.fontSize = 'clamp(2.6rem,9vw,3.8rem)'; }

  // Rep display
  const repEl = $('rep-display');
  if (S.phase === 'idle') { repEl.textContent = 'PRÊT'; repEl.style.color = '#1e1e1e'; }
  else if (isDone)        { repEl.textContent = `${S.reps} REPS ✓`; repEl.style.color = '#282828'; }
  else                    { repEl.textContent = `REP ${S.currentRep} / ${S.reps}`; repEl.style.color = '#282828'; }

  // Music indicator
  const micEl = $('music-indicator');
  if (isRunning) {
    const prov = isEffort ? S.effortProvider : S.restProvider;
    const lbl  = isEffort
      ? (prov === 'file' ? S.effortFileName : S.effortUrl ? PROVIDERS.find(p=>p.id===prov)?.name : '')
      : (prov === 'file' ? S.restFileName   : S.restUrl   ? PROVIDERS.find(p=>p.id===prov)?.name : '');
    const icon = PROVIDERS.find(p=>p.id===prov)?.icon || '';
    micEl.textContent = lbl ? `${icon} ${lbl}` : '';
    micEl.style.color = ac + '66';
  } else {
    micEl.textContent = '';
  }

  // Rep dots
  const dotsEl = $('rep-dots');
  dotsEl.innerHTML = '';
  if (isRunning) {
    for (let i = 0; i < S.reps; i++) {
      const d = document.createElement('div');
      d.style.cssText = `width:7px;height:7px;border-radius:50%;background:${i < S.currentRep ? ac : '#181818'};opacity:${i < S.currentRep - 1 ? 0.45 : 1};transition:background 0.3s`;
      dotsEl.appendChild(d);
    }
  }

  // Settings panel
  $('settings-panel').style.display = (isRunning || isDone) ? 'none' : 'block';

  // Buttons
  const btnArea = $('btn-area');
  btnArea.innerHTML = '';
  if (S.phase === 'idle') {
    const b = document.createElement('button');
    b.className = 'pill';
    b.style.cssText = 'flex:1;padding:15px 0;font-size:clamp(1.5rem,5vw,2.2rem);letter-spacing:5px;background:#ff4d00;color:#fff;box-shadow:0 0 30px rgba(255,77,0,0.2)';
    b.textContent = 'DÉMARRER';
    b.onclick = startTabata;
    btnArea.appendChild(b);
  } else if (isRunning) {
    const b = document.createElement('button');
    b.className = 'pill';
    b.style.cssText = 'flex:1;padding:15px 0;font-size:1.5rem;letter-spacing:4px;background:#111;color:#383838;border:1px solid #1a1a1a';
    b.textContent = '■  STOP';
    b.onclick = reset;
    btnArea.appendChild(b);
  } else if (isDone) {
    const b1 = document.createElement('button');
    b1.className = 'pill';
    b1.style.cssText = 'flex:1;padding:15px 0;font-size:1.8rem;letter-spacing:4px;background:#ff4d00;color:#fff';
    b1.textContent = 'REJOUER';
    b1.onclick = startTabata;
    const b2 = document.createElement('button');
    b2.className = 'pill';
    b2.style.cssText = 'padding:15px 18px;font-size:1.5rem;background:#111;color:#383838;border:1px solid #1a1a1a';
    b2.textContent = '↩';
    b2.onclick = reset;
    btnArea.appendChild(b1);
    btnArea.appendChild(b2);
  }
}

// ─── INIT ───────────────────────────────────────────────────
buildMusicUI('effort');
buildMusicUI('rest');
render();

// ─── PWA INSTALL ────────────────────────────────────────────
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  $('install-banner').classList.add('show');
});
$('install-btn').onclick = async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  $('install-banner').classList.remove('show');
};
$('close-banner').onclick = () => $('install-banner').classList.remove('show');

// iOS install hint (Safari only)
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
const isInStandalone = window.matchMedia('(display-mode: standalone)').matches;
if (isIOS && !isInStandalone) {
  const banner = $('install-banner');
  banner.querySelector('span').textContent = '📲 Sur iPhone : icône Partager → "Sur l\'écran d\'accueil" pour installer l\'app';
  banner.querySelector('#install-btn').style.display = 'none';
  banner.classList.add('show');
}

// ─── SERVICE WORKER ─────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
